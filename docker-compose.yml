services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-testdump
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: ODV_TEST
      APP_USER_PASSWORD: odv_test
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/sql:/opt/oracle/scripts/sql
      - ./output:/opt/oracle/dump
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

volumes:
  oracle-data:
